# CryptoSentinel Model Configuration
# configs/model_config.yaml

general:
  random_seed: 42
  target_horizon: 4          # 예측 기간 (캔들 수)
  target_threshold: 0.005    # 매수/매도 판단 기준 (0.5%)
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

xgboost:
  objective: "multi:softprob"
  num_class: 3
  max_depth: 6
  learning_rate: 0.05
  n_estimators: 500
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  min_child_weight: 5
  early_stopping_rounds: 50
  eval_metric: "mlogloss"
  tree_method: "hist"

lstm:
  input_size: null           # 자동 계산 (피처 수)
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  num_classes: 3
  seq_length: 60             # 시퀀스 길이 (캔들 수)
  batch_size: 64
  learning_rate: 0.001
  epochs: 100
  patience: 15               # Early stopping patience
  weight_decay: 0.00001
  grad_clip: 1.0

ensemble:
  method: "logistic_regression"  # meta learner
  weights: null                  # null = 자동 학습

sentiment:
  provider: "local"          # "local" or "bedrock"
  local_model: "cardiffnlp/twitter-roberta-base-sentiment-latest"
  bedrock_model: "anthropic.claude-3-haiku-20240307-v1:0"
  cache_ttl: 3600            # 감성 점수 캐시 (초)

features:
  timeframes:
    - "1h"                   # 주 타임프레임
  indicators:
    trend:
      - sma: [7, 25, 99]
      - ema: [12, 26]
      - macd: { fast: 12, slow: 26, signal: 9 }
      - adx: 14
      - ichimoku: { conversion: 9, base: 26 }
    momentum:
      - rsi: [7, 14]
      - stochastic: { k: 14, d: 3 }
      - williams_r: 14
      - roc: 10
      - cci: 20
    volatility:
      - bollinger: { window: 20, std: 2 }
      - atr: 14
      - keltner: { window: 20 }
    volume:
      - obv: true
      - mfi: 14
      - cmf: 20
      - volume_sma: 20
    custom:
      - returns: [1, 3, 5, 10, 20]
      - log_return: true
      - candle_pattern: true
      - price_position: [20, 50]
