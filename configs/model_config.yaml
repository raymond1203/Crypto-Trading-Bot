# CryptoSentinel Model Configuration
# configs/model_config.yaml

general:
  random_seed: 42
  target_horizon: 4          # 예측 기간 (캔들 수)
  target_threshold: 0.003    # 매수/매도 판단 기준 (0.3%)
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

xgboost:
  objective: "multi:softprob"
  num_class: 3
  max_depth: 6
  learning_rate: 0.05
  n_estimators: 500
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  min_child_weight: 5
  early_stopping_rounds: 50
  eval_metric: "mlogloss"
  tree_method: "hist"

lstm:
  input_size: null           # 자동 계산 (피처 수)
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  num_classes: 3
  seq_length: 60             # 시퀀스 길이 (캔들 수)
  batch_size: 64
  learning_rate: 0.001
  epochs: 100
  patience: 15               # Early stopping patience
  weight_decay: 0.00001
  grad_clip: 1.0

ensemble:
  method: "logistic_regression"  # meta learner
  weights: null                  # null = 자동 학습
  signal_threshold: 0.45         # Buy/Sell 확률이 이 값 초과 시 신호 생성
  regime_suppress_sideways: false  # true면 횡보장에서 거래 억제
  regime_weights:
    bull:
      xgboost: 0.6
      lstm: 0.4
    bear:
      xgboost: 0.7
      lstm: 0.3
    sideways:
      xgboost: 0.4
      lstm: 0.6

sentiment:
  provider: "dual"           # "dual", "crypto", "finbert", "bedrock"
  crypto_model: "ElKulako/cryptobert"
  fin_model: "ProsusAI/finbert"
  bedrock_model: "anthropic.claude-3-haiku-20240307-v1:0"
  cache_ttl: 3600            # 감성 점수 캐시 (초)

regime:
  adx_trend_threshold: 25     # ADX가 이 값 초과면 추세장
  sma_slope_window: 10         # SMA slope 계산 윈도우
  sma_window: 25               # SMA 윈도우

feature_selection:
  enabled: true                  # true면 상관관계/분산 기반 피처 선택 적용
  corr_threshold: 0.90           # 이 값 초과 상관관계 피처 제거
  variance_threshold: 0.00000001 # near-constant 피처 제거 기준

features:
  use_raw_time_features: false  # true면 hour, day_of_week, month 원본 추가 (과적합 주의)
  timeframes:
    - "1h"                   # 주 타임프레임
  indicators:
    trend:
      - sma: [7, 25, 99]
      - ema: [12, 26]
      - macd: { fast: 12, slow: 26, signal: 9 }
      - adx: 14
      - ichimoku: { conversion: 9, base: 26 }
    momentum:
      - rsi: [7, 14]
      - stochastic: { k: 14, d: 3 }
      - williams_r: 14
      - roc: 10
      - cci: 20
    volatility:
      - bollinger: { window: 20, std: 2 }
      - atr: 14
      - keltner: { window: 20 }
    volume:
      - obv: true
      - mfi: 14
      - cmf: 20
      - volume_sma: 20
    custom:
      - returns: [1, 3, 5, 10, 20]
      - log_return: true
      - candle_pattern: true
      - price_position: [20, 50]
